<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Spendly{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page">
    <nav class="nav">
      {% if session.user_id %}
        <span class="nav-user">{{ session.user_name }}</span>
        <a class="link" href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a class="link" href="{{ url_for('login') }}">Login</a>
        <a class="link" href="{{ url_for('register') }}">Register</a>
      {% endif %}
    </nav>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
